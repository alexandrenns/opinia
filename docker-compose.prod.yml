version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: opinia_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opinia_db}
      POSTGRES_USER: ${POSTGRES_USER:-opinia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - opinia_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: opinia_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-opinia_user}:${POSTGRES_PASSWORD:-change_me_in_prod}@postgres:5432/${POSTGRES_DB:-opinia_db}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-https://yourdomain.com}
      PUBLIC_URL: ${PUBLIC_URL:-https://yourdomain.com}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
    networks:
      - opinia_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        API_URL: ${API_URL:-https://api.yourdomain.com}
    container_name: opinia_frontend
    restart: always
    networks:
      - opinia_net

  nginx:
    image: nginx:alpine
    container_name: opinia_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - opinia_net

volumes:
  postgres_data:
  uploads_data:

networks:
  opinia_net:
    driver: bridge
